<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 208 212" role="img" aria-label="FutureRoots">
  <defs>
    <linearGradient id="frShield" x1="10%" y1="6%" x2="90%" y2="94%">
      <stop offset="0%" stop-color="#2BAD4F"/>
      <stop offset="58%" stop-color="#1F9B72"/>
      <stop offset="100%" stop-color="#1547C9"/>
    </linearGradient>
    <path id="frLeaf" d="M0 -10 C5.5 -5.5 6.5 3 0 10 C-6.5 3 -5.5 -5.5 0 -10 Z"/>
  </defs>

  <!-- shield -->
  <path d="M104 18
           C 130 27 156 32 182 34
           L 182 102
           C 182 150 154 184 104 202
           C 54 184 26 150 26 102
           L 26 34
           C 52 32 78 27 104 18 Z"
        fill="url(#frShield)"/>

  <!-- pixelating top-right corner: stepped white cut + squares -->
  <path d="M162 20 L186 20 L186 46 L174 46 L174 34 L162 34 Z" fill="#fff"/>
  <g fill="#2A66DD">
    <rect x="163" y="21" width="13" height="13" rx="1.5"/>
    <rect x="179" y="11" width="11" height="11" rx="1.5"/>
    <rect x="188" y="26" width="8" height="8" rx="1"/>
    <rect x="177" y="37" width="6" height="6" rx="1"/>
    <rect x="194" y="40" width="5" height="5" rx="1"/>
  </g>

  <!-- adult: head + slender body -->
  <circle cx="67" cy="77" r="14.5" fill="#fff"/>
  <path d="M52 152 L52 116 C52 100 56 96 67 96 C78 96 84 103 84 114 C84 122 81 128 76 132 L76 152 Z" fill="#fff"/>
  <!-- embracing arm, arcing over the child with blue showing through -->
  <path d="M80 100 C102 100 114 116 108 138" stroke="#fff" stroke-width="8.5" stroke-linecap="round" fill="none"/>

  <!-- child -->
  <circle cx="92" cy="124" r="9.5" fill="#fff"/>
  <path d="M81 152 C81 142 85 136 92 136 C99 136 104 142 104 152 Z" fill="#fff"/>

  <!-- tree: thick curved trunk, branches -->
  <g stroke="#fff" stroke-linecap="round" fill="none">
    <path d="M145 148 C140 132 140 112 144 96" stroke-width="8"/>
    <path d="M144 98 L131 80" stroke-width="6"/>
    <path d="M144 96 L158 76" stroke-width="6"/>
    <path d="M143 116 L125 102" stroke-width="5"/>
    <path d="M143 108 L165 98" stroke-width="5"/>
    <path d="M144 84 L145 66" stroke-width="5.5"/>
  </g>
  <!-- large pointed leaves -->
  <g fill="#fff">
    <use href="#frLeaf" transform="translate(144 58) scale(2.0)"/>
    <use href="#frLeaf" transform="translate(121 70) rotate(-36) scale(1.75)"/>
    <use href="#frLeaf" transform="translate(163 70) rotate(36) scale(1.65)"/>
    <use href="#frLeaf" transform="translate(110 100) rotate(-60) scale(1.6)"/>
    <use href="#frLeaf" transform="translate(173 98) rotate(60) scale(1.65)"/>
    <use href="#frLeaf" transform="translate(132 94) rotate(-16) scale(0.95)"/>
  </g>

  <!-- ground swoosh the family stands on (covers their bases) -->
  <path d="M29 160 C66 140 126 124 179 132 L179 147 C126 138 68 154 29 176 Z" fill="#fff"/>
</svg>
